# ============================================================
#  BLOOM & CO. — docker-compose.yml
#  Runs: Node/Express app  +  MySQL 8 database
# ============================================================

version: '3.9'

services:

  # ── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bloomco_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bloomco
      MYSQL_USER: bloomco_user
      MYSQL_PASSWORD: bloomco_pass
    ports:
      - "3306:3306"           # expose to host for DB tools (optional)
    volumes:
      - db_data:/var/lib/mysql                  # persistent data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql  # auto-seed on first run
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Node / Express App ────────────────────────────────────
  app:
    build: .
    container_name: bloomco_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST:     db
      DB_USER:     bloomco_user
      DB_PASSWORD: bloomco_pass
      DB_NAME:     bloomco
      PORT:        3000
    depends_on:
      db:
        condition: service_healthy   # wait until MySQL is ready

# ── Named Volumes ─────────────────────────────────────────
volumes:
  db_data: