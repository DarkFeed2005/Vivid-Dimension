# ============================================================
#  BLOOM & CO. — docker-compose.yml
# ============================================================

version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: bloomco_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bloomco
      MYSQL_USER: bloomco_user
      MYSQL_PASSWORD: bloomco_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: bloomco_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST:     db
      DB_USER:     bloomco_user
      DB_PASSWORD: bloomco_pass
      DB_NAME:     bloomco
      PORT:        3000
      JWT_SECRET:  bloomco_jwt_secret_change_in_production
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: